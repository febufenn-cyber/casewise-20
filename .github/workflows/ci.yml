name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  casewise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - run: npm run check:migrations
      - run: npm run validate:phase1
      - run: npm run validate:phase2
      - run: npm run typecheck
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m compileall -q processor
      - run: docker build -t casewise-processor processor
